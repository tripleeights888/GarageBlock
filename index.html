<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15171C">
<title>Garage Block</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2315171C'/%3E%3Crect x='10' y='26' width='8' height='12' rx='2' fill='%23FF7A3D'/%3E%3Crect x='46' y='26' width='8' height='12' rx='2' fill='%23FF7A3D'/%3E%3Crect x='18' y='30' width='28' height='4' rx='2' fill='%23EDEDE8'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15171C; --panel:#1E2128; --panel2:#262A33; --line:#31363F;
  --ink:#EDEDE8; --muted:#9AA0AB; --faint:#6B717D;
  --accent:#FF7A3D; --accent-dim:#B8551F;
  --steel:#6EA8C9; --green:#57C785; --violet:#A78BE0; --red:#E5604C; --gold:#E8B33C;
  --disp:"Barlow Condensed",Impact,sans-serif;
  --body:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.45;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--body);font-size:16px;background:var(--panel2);color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:9px 10px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
h1,h2,h3,.disp{font-family:var(--disp);text-transform:uppercase;letter-spacing:.03em;font-weight:600}
a{color:var(--steel)}
.wrap{max-width:760px;margin:0 auto;padding:14px max(14px,env(safe-area-inset-right,0px)) 20px max(14px,env(safe-area-inset-left,0px))}
/* Header */
header{position:sticky;top:0;z-index:30;background:rgba(21,23,28,.96);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top,0px)) max(14px,env(safe-area-inset-left,0px)) 8px max(14px,env(safe-area-inset-right,0px))}
.hd{max-width:760px;margin:0 auto;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.hd h1{font-size:26px;line-height:1}
.hd h1 span{color:var(--accent)}
.hd .sub{font-family:var(--disp);font-size:14px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
/* Bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(21,23,28,.96);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  padding:0 env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px)}
.nav-in{max-width:760px;margin:0 auto;display:flex}
.nav-btn{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--faint);
  font-size:10.5px;font-weight:600;letter-spacing:.04em}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.on{color:var(--accent)}
/* Cards / chips */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card h2{font-size:19px;margin-bottom:8px}
.card h3{font-size:16px;color:var(--muted)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--disp);text-transform:uppercase;font-size:13px;
  letter-spacing:.06em;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.chip.acc{border-color:var(--accent-dim);color:var(--accent)}
.chip.steel{border-color:#3d5b6e;color:var(--steel)}
.chip.green{border-color:#2f6647;color:var(--green)}
.chip.violet{border-color:#5b4f83;color:var(--violet)}
.chip.gold{border-color:#7a6224;color:var(--gold)}
.platechip{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--panel2)}
.platechip button{padding:8px 13px;font-size:14px;font-weight:600;color:var(--muted)}
.platechip.has{border-color:var(--accent-dim)}
.platechip.has button{color:var(--ink)}
.platechip.has button b{color:var(--accent);font-weight:700}
.platechip .pm{border-left:1px solid var(--line);padding:8px 11px;color:var(--faint)}
.muted{color:var(--muted)} .faint{color:var(--faint)} .small{font-size:12.5px}
.btn{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 14px;font-weight:600;font-size:14px;color:var(--ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1208}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red);border-color:#5a3630}
.btn:disabled{opacity:.45;cursor:default}
.btn-sm{padding:5px 10px;font-size:13px;border-radius:7px}
hr{border:0;border-top:1px solid var(--line);margin:12px 0}
/* Today session board */
.sess-head{display:flex;justify-content:space-between;align-items:flex-end;margin:4px 2px 10px}
.sess-head .big{font-size:30px;line-height:1}
.ex-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ex-card.done{border-color:#2f6647}
.ex-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.ex-name{font-family:var(--disp);font-size:19px;text-transform:uppercase;letter-spacing:.02em}
.ex-rx{color:var(--muted);font-size:13px;margin-top:1px}
.ex-note{color:var(--faint);font-size:12.5px;margin-top:6px}
.setpills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{min-width:64px;padding:7px 9px;border-radius:9px;border:1.5px dashed var(--line);background:var(--panel2);
  text-align:center;font-size:13px;font-weight:600;color:var(--faint)}
.pill .lab{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--faint)}
.pill.filled{border-style:solid;border-color:var(--accent-dim);color:var(--ink)}
.pill.filled .lab{color:var(--accent)}
.ex-actions{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.lasttime{font-size:12px;color:var(--steel)}
.pr-flag{color:var(--gold);font-weight:700;font-size:12px}
/* rest timer bar */
#timerbar{position:fixed;left:0;right:0;bottom:calc(58px + env(safe-area-inset-bottom));z-index:35;display:none}
#timerbar.show{display:block}
.timer-in{max-width:760px;margin:0 auto;padding:0 max(14px,env(safe-area-inset-right,0px)) 0 max(14px,env(safe-area-inset-left,0px))}
.timer-card{background:var(--panel2);border:1px solid var(--accent-dim);border-radius:12px;padding:8px 14px;
  display:flex;align-items:center;gap:12px;box-shadow:0 6px 24px rgba(0,0,0,.45)}
.timer-card .t{font-family:var(--disp);font-size:30px;min-width:74px;color:var(--accent)}
.tprog{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.tprog i{display:block;height:100%;background:var(--accent);width:100%}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:560px;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));
  max-height:calc(100vh - env(safe-area-inset-top,0px) - 40px);
  max-height:calc(100dvh - env(safe-area-inset-top,0px) - 40px);overflow-y:auto;overscroll-behavior:contain}
@media(min-width:600px){.modal-bg{align-items:center}.modal{border-radius:16px}}
.modal h2{font-size:21px;margin-bottom:10px}
.setgrid{display:grid;grid-template-columns:44px 1fr 1fr 40px;gap:8px;align-items:center;margin-bottom:8px}
.setgrid .n{font-family:var(--disp);font-size:17px;color:var(--muted);text-align:center}
.iconbtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
  display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
/* plan */
.wkbar{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.wkbar::-webkit-scrollbar{display:none}
.wk{min-width:52px;text-align:center;padding:7px 4px;border-radius:10px;border:1px solid var(--line);background:var(--panel)}
.wk .n{font-family:var(--disp);font-size:18px;display:block;line-height:1}
.wk .p{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.wk.on{border-color:var(--accent);background:var(--panel2)}
.wk.now .n{color:var(--accent)}
.dayrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line)}
.dayrow:last-child{border-bottom:none}
.dayrow .dn{width:44px;font-family:var(--disp);font-size:15px;text-transform:uppercase;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--line);flex:none}
.dot.full{background:var(--green)} .dot.part{background:var(--gold)}
.dot.skip{background:transparent;border:2px solid var(--faint)}
/* nutrition */
.ngrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nfield label{display:block;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;font-weight:600}
.tbar{height:6px;background:var(--line);border-radius:3px;margin-top:5px;overflow:hidden}
.tbar i{display:block;height:100%;border-radius:3px;background:var(--steel)}
.tbar i.over{background:var(--red)} .tbar i.hit{background:var(--green)}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px}
.stat .v{font-family:var(--disp);font-size:26px;line-height:1.05}
.stat .l{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:600}
.stat .d{font-size:11px;color:var(--muted)}
/* charts */
.chart{width:100%;height:auto;display:block}
.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:10px}
.seg button{flex:1;padding:8px 4px;font-size:13px;font-weight:600;color:var(--muted);background:var(--panel)}
.seg button.on{background:var(--panel2);color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-family:var(--disp);text-transform:uppercase;font-size:13px;letter-spacing:.05em;color:var(--faint);
  text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
.banner{background:#2b2115;border:1px solid #6b4a1c;color:var(--gold);border-radius:10px;padding:10px 12px;
  font-size:13px;margin-bottom:12px;display:flex;gap:10px;align-items:center}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(120px + env(safe-area-inset-bottom));
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 16px;font-size:13.5px;
  z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1}
.view{display:none}.view.on{display:block}
.empty{color:var(--faint);text-align:center;padding:26px 10px;font-size:13.5px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <h1>Garage<span>Block</span></h1>
    <div class="sub" id="hd-sub"></div>
  </div>
</header>

<div class="wrap">
  <div id="backup-banner" class="banner" style="display:none">
    <span class="grow">No backup in a while. Export your data so a cleared browser cache can't wipe it.</span>
    <button class="btn btn-sm" onclick="exportJSON()">Export</button>
  </div>

  <div id="view-today" class="view"></div>
  <div id="view-plan" class="view"></div>
  <div id="view-nutrition" class="view"></div>
  <div id="view-progress" class="view"></div>
  <div id="view-more" class="view"></div>
</div>

<div id="timerbar"><div class="timer-in"><div class="timer-card">
  <div class="t" id="timer-t">0:00</div>
  <div class="tprog"><i id="timer-fill"></i></div>
  <button class="iconbtn" onclick="timerAdd(30)" aria-label="Add 30 seconds">+30</button>
  <button class="iconbtn" onclick="timerStop()" aria-label="Stop timer">✕</button>
</div></div></div>

<div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div id="toast" class="toast"></div>

<nav><div class="nav-in">
  <button class="nav-btn" data-v="today" onclick="go('today')">
    <svg viewBox="0 0 24 24"><path d="M4 12h2m12 0h2M7 8v8m10-8v8M9 12h6M7 6h.01M17 6h.01"/><rect x="5" y="7" width="2.5" height="10" rx="1"/><rect x="16.5" y="7" width="2.5" height="10" rx="1"/></svg>
    Today</button>
  <button class="nav-btn" data-v="plan" onclick="go('plan')">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    Plan</button>
  <button class="nav-btn" data-v="nutrition" onclick="go('nutrition')">
    <svg viewBox="0 0 24 24"><path d="M12 3c-4 4-7 6.5-7 10.5a7 7 0 0 0 14 0C19 9.5 16 7 12 3z"/></svg>
    Fuel</button>
  <button class="nav-btn" data-v="progress" onclick="go('progress')">
    <svg viewBox="0 0 24 24"><path d="M4 19V5m0 14h16M8 15l3-4 3 2 5-6"/></svg>
    Progress</button>
  <button class="nav-btn" data-v="more" onclick="go('more')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.6"/><circle cx="5" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
    More</button>
</div></nav>

<script src="./app.js"></script>
</body>
</html>
